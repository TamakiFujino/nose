appId: com.tamakifujino.nose
---
# Test 07-02: Blocked User Cannot Add Blocker (User B; after 07-01)
# User A has blocked User B in 07-01. User B logs in, verifies User A is not on Friends list,
# then tries to add User A by ID and sees an error (User Not Found).

- launchApp

# User A: copy own ID to clipboard for User B to paste later
- runFlow: shared/login_user_a.yaml
- runFlow: shared/dismiss_location_permission.yaml
- tapOn: "Personal Library"
- tapOn: "Add Friend"
- assertVisible:
    id: "user_id_value"
- tapOn:
    id: "copy_button"
- runFlow: shared/go_back.yaml
- runFlow: shared/go_back.yaml
- runFlow: shared/logout.yaml
- assertVisible: "Continue with Google"

# User B: verify User A not on Friends list, then try to add User A (paste ID copied above)
- runFlow: shared/login_user_b.yaml
- runFlow: shared/dismiss_location_permission.yaml

# Open Friends list and verify User A is not listed (removed when A blocked B)
- runFlow: shared/open_friends_list.yaml
- extendedWaitUntil:
    visible: "Friends"
    timeout: 5000
- assertNotVisible: "User A"
- runFlow: shared/go_back.yaml
- runFlow: shared/go_back.yaml

# Add Friend: paste User A's ID and trigger search
- tapOn: "Personal Library"
- tapOn: "Add Friend"
- longPressOn:
    id: "search_by_user_id"
- tapOn:
    text: "Paste"
    optional: true
- tapOn:
    text: "Allow Paste"
    optional: true
# Trigger search (press keyboard Search/Enter)
- inputText: "\n"
# App shows "User Not Found" when the other user has blocked you
- extendedWaitUntil:
    visible: "User Not Found"
    timeout: 10000
- tapOn: "OK"

# Navigate back and logout
- runFlow: shared/go_back.yaml
- runFlow: shared/go_back.yaml
- runFlow: shared/logout.yaml
- assertVisible: "Continue with Google"

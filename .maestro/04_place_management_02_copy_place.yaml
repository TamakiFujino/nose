appId: com.tamakifujino.nose
---
# Test 04-02: Copy Place to Another Collection (User A)
# User A copies "Pinnacles National Park" from "National Parks" to "Test Collection".

- launchApp

# Sign in as User A
- runFlow: shared/login_user_a.yaml
- runFlow: shared/dismiss_location_permission.yaml

# Open collections and tap "National Parks"
- runFlow: shared/open_collections.yaml
- tapOn: "National Parks"

# Wait for the place to appear
- extendedWaitUntil:
    visible: "Pinnacles National Park"
    timeout: 10000

# Swipe left on the place to reveal actions
- swipe:
    from:
      text: "Pinnacles National Park"
    direction: LEFT
    duration: 400

# Tap "Copy" swipe action
- tapOn: "Copy"

# Select target collection from action sheet
- extendedWaitUntil:
    visible: "Copy to Collection"
    timeout: 5000
- tapOn: "Test Collection"

# Confirm copy in the alert
- extendedWaitUntil:
    visible: "Copy Place"
    timeout: 5000
- tapOn: "Copy"

# Wait for copy to complete
- waitForAnimationToEnd:
    timeout: 5000

# Dismiss collection detail modal, then collection list modal
- runFlow: shared/dismiss_modal.yaml
- runFlow: shared/dismiss_modal.yaml
- runFlow: shared/logout.yaml
- assertVisible: "Continue with Google"

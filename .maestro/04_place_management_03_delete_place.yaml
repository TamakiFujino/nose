appId: com.tamakifujino.nose
---
# Test 04-03: Delete Place from Collection (User A)
# User A deletes "Kings Canyon National Park" from "National Parks".

- launchApp

# Sign in as User A
- runFlow: shared/login_user_a.yaml
- runFlow: shared/dismiss_location_permission.yaml

# Open collections and tap "National Parks"
- runFlow: shared/open_collections.yaml
- tapOn: "National Parks"

# Wait for the place to appear
- extendedWaitUntil:
    visible: "Kings Canyon National Park"
    timeout: 10000

# Swipe left on the place to reveal actions
- swipe:
    from:
      text: "Kings Canyon National Park"
    direction: LEFT
    duration: 400

# Tap "Delete" swipe action
- tapOn: "Delete"

# Confirm deletion in the alert
- extendedWaitUntil:
    visible: "Delete Place"
    timeout: 5000
- tapOn: "Delete"

# Wait for deletion to complete and verify place is gone
- waitForAnimationToEnd:
    timeout: 5000
- assertNotVisible: "Kings Canyon National Park"

# Dismiss collection detail modal, then collection list modal
- runFlow: shared/dismiss_modal.yaml
- runFlow: shared/dismiss_modal.yaml
- runFlow: shared/logout.yaml
- assertVisible: "Continue with Google"

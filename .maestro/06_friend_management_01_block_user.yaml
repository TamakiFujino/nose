appId: com.tamakifujino.nose
---
# Test 06-01: Block User (User A blocks User B)
# User A blocks User B from the Friends list.

- launchApp

# Sign in as User A
- runFlow: shared/login_user_a.yaml
- runFlow: shared/dismiss_location_permission.yaml

# Open Friends List
- runFlow: shared/open_friends_list.yaml

# Verify User B is visible on Friends tab
- assertVisible: "User B"

# Tap User B to show action sheet
- tapOn: "User B"

# Tap "Block User" from the action sheet
- tapOn: "Block User"

# Confirm block in the confirmation modal
- extendedWaitUntil:
    visible: "Block user?"
    timeout: 5000
- tapOn: "Block"

# Success message
- extendedWaitUntil:
    visible: "Success"
    timeout: 5000
- tapOn: "OK"

# Verify User B is no longer on Friends tab
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible: "User B"

# Switch to Blocked tab and verify User B appears
- tapOn: "Blocked"
- extendedWaitUntil:
    visible: "User B"
    timeout: 5000

# Navigate back (Friends List → Settings → Home)
- runFlow: shared/go_back.yaml
- runFlow: shared/go_back.yaml

# Logout
- runFlow: shared/logout.yaml
- assertVisible: "Continue with Google"

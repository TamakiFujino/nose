appId: com.tamakifujino.nose
---
# Test 99-03: Safety-net Cleanup for Both Users
# Ensures both test accounts are deleted regardless of prior test failures.
# If an account was already deleted by 99_01/99_02, Google Sign-In will show
# the name registration screen — we complete registration then immediately delete.

- launchApp

# --- Cleanup User A ---
- runFlow: shared/login_user_a.yaml

# If name registration screen appears, the account was previously deleted
- runFlow:
    when:
      visible: "What should we call you?"
    file: shared/register_user_a.yaml

- runFlow: shared/dismiss_location_permission.yaml

# Delete the account
- runFlow: shared/delete_current_account.yaml

# Verify returned to login screen
- assertVisible: "Continue with Google"

# --- Cleanup User B ---
- runFlow: shared/login_user_b.yaml

# If name registration screen appears, the account was previously deleted
- runFlow:
    when:
      visible: "What should we call you?"
    file: shared/register_user_b.yaml

- runFlow: shared/dismiss_location_permission.yaml

# Delete the account
- runFlow: shared/delete_current_account.yaml

# Verify returned to login screen
- assertVisible: "Continue with Google"

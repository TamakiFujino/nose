appId: com.tamakifujino.nose
---
# Test 05-01: Edit Collection Name & Icon (User A)
# User A changes the collection icon and renames "Test Collection" to "Renamed Collection".
# At the end, renames back to "Test Collection" so the test is independent.

- launchApp

# Sign in as User A
- runFlow: shared/login_user_a_ready.yaml

# Open collections and tap "Test Collection"
- runFlow: shared/open_collections.yaml
- tapOn: "Test Collection"

# Open More menu and tap Edit Collection
- tapOn: "More"
- tapOn: "Edit Collection"

# Assert edit modal is visible
- assertVisible: "Edit Collection"

# Change collection icon: open picker, switch to different tab, select first icon, close
- tapOn:
    id: "icon_button"
- extendedWaitUntil:
    visible: "Hobby"
    timeout: 10000
# Switch to Food tab and select first icon
- tapOn: "Food"
- extendedWaitUntil:
    visible:
      id: "icon_cell_0"
    timeout: 10000
- tapOn:
    id: "icon_cell_0"

# Clear existing name and type new name
- tapOn:
    id: "collection_name_field"
- eraseText: 50
- inputText: "Renamed Collection"
# Dismiss keyboard by tapping 20% from top (safe area, avoids icon button)
- tapOn:
    point: "80%,50%"
- tapOn: "Save"

# Verify the updated name appears
- extendedWaitUntil:
    visible: "Renamed Collection"
    timeout: 10000

# Rename back to "Test Collection" so test is independent (04-01, 03-01 expect this name)
- tapOn: "More"
- tapOn: "Edit Collection"
- extendedWaitUntil:
    visible: "Edit Collection"
    timeout: 5000
- tapOn:
    id: "collection_name_field"
- eraseText: 50
- inputText: "Test Collection"
- tapOn:
    point: "80%,50%"
- tapOn: "Save"
- extendedWaitUntil:
    visible: "Test Collection"
    timeout: 10000

# Dismiss collection detail modal, then collection list modal
- runFlow: shared/dismiss_collection_and_minimized.yaml
- runFlow: shared/logout.yaml
- assertVisible: "Continue with Google"

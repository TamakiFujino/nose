appId: com.tamakifujino.nose
---
# Test 99-04: Delete User A with pending request; User B no longer sees User A in Requested or Friends
# After User A deletes account, User B must not see User A in Requested tab (or Friends).
# Prerequisite: Run after 01-01 and 01-02 (User A and User B exist; User B has sent friend request to User A, not accepted).
# Do NOT run 01-03 or 99-01 in the same run — this test deletes User A.

- launchApp

# User A: delete account
- runFlow: shared/login_user_a.yaml
- runFlow: shared/dismiss_location_permission.yaml
- runFlow: shared/delete_current_account.yaml
- assertVisible: "Continue with Google"

# User B: verify User A no longer in Requested or Friends
- runFlow: shared/login_user_b.yaml
- runFlow: shared/dismiss_location_permission.yaml
- runFlow: shared/open_friends_list.yaml
- tapOn: "Requested"
- extendedWaitUntil:
    visible: "Requested"
    timeout: 5000
- assertNotVisible: "User A"
- tapOn:
    id: "Friends_tab"
- extendedWaitUntil:
    visible: "Friends"
    timeout: 5000
- assertNotVisible: "User A"
- runFlow: shared/go_back.yaml
- runFlow: shared/go_back.yaml
- runFlow: shared/logout.yaml
- assertVisible: "Continue with Google"

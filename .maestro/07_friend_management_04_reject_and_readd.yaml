appId: com.tamakifujino.nose
---
# Test 08-01: Reject Friend Request and Re-add (User B sends, User A rejects, User B re-sends, User A approves)
# Requires: User A's ID in clipboard (from 01-01 when tests run in order).

- launchApp

# --- Step 1: User B sends friend request to User A ---
- runFlow: shared/login_user_b.yaml
- runFlow: shared/dismiss_location_permission.yaml
- tapOn: "Personal Library"
- tapOn: "Add Friend"
# Paste User A's ID and trigger search (same flow as 01-02)
- tapOn:
    id: "search_by_user_id"
- longPressOn:
    id: "search_by_user_id"
- tapOn:
    text: "Paste"
    optional: true
- tapOn:
    text: "Allow Paste"
    optional: true
- pressKey: Enter
- extendedWaitUntil:
    visible: "User A"
    timeout: 10000
- tapOn:
    id: "add_friend_button"
- assertVisible: "Request Sent!"
- tapOn: "OK"
# Navigate back
- runFlow: shared/go_back.yaml
- runFlow: shared/go_back.yaml
- runFlow: shared/logout.yaml

# --- Step 2: User A rejects the request ---
- runFlow: shared/login_user_a.yaml
- runFlow: shared/dismiss_location_permission.yaml
- runFlow: shared/open_friends_list.yaml
- tapOn: "Pending"
- extendedWaitUntil:
    visible: "User B"
    timeout: 10000
# Tap Reject
- tapOn: "Reject"
# Confirm rejection
- extendedWaitUntil:
    visible: "Reject request"
    timeout: 5000
- tapOn: "Reject"
# Verify User B is gone from Pending
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible: "User B"
# Navigate back (Friends List → Settings → Home)
- runFlow: shared/go_back.yaml
- runFlow: shared/go_back.yaml
- runFlow: shared/logout.yaml

# --- Step 3: User B re-sends friend request ---
- runFlow: shared/login_user_b.yaml
- runFlow: shared/dismiss_location_permission.yaml
- tapOn: "Personal Library"
- tapOn: "Add Friend"
# Paste User A's ID again and trigger search (same flow as 01-02)
- tapOn:
    id: "search_by_user_id"
- longPressOn:
    id: "search_by_user_id"
- tapOn:
    text: "Paste"
    optional: true
- tapOn:
    text: "Allow Paste"
    optional: true
- pressKey: Enter
- extendedWaitUntil:
    visible: "User A"
    timeout: 10000
- tapOn:
    id: "add_friend_button"
- assertVisible: "Request Sent!"
- tapOn: "OK"
# Navigate back
- runFlow: shared/go_back.yaml
- runFlow: shared/go_back.yaml
- runFlow: shared/logout.yaml

# --- Step 4: User A accepts the re-sent request ---
- runFlow: shared/login_user_a.yaml
- runFlow: shared/dismiss_location_permission.yaml
- runFlow: shared/open_friends_list.yaml
- tapOn: "Pending"
- extendedWaitUntil:
    visible: "User B"
    timeout: 10000
# Approve the request
- tapOn: "Approve"
- tapOn: "Approve"
- tapOn: "OK"
# Verify User B appears in Friends tab
- tapOn:
    id: "Friends_tab"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "User B"
    timeout: 5000
# Navigate back (Friends List → Settings → Home)
- runFlow: shared/go_back.yaml
- runFlow: shared/go_back.yaml
- runFlow: shared/logout.yaml
- assertVisible: "Continue with Google"
